<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1c2a3a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Privateer">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="icon" href="favicon.png">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            overscroll-behavior-x: none;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: pan-y pinch-zoom;
        }

        #burger-btn {
            position: fixed;
            left: 0;
            top: 0;
            width: 5vw;
            height: 5vw;
            min-width: 28px;
            min-height: 28px;
            cursor: pointer;
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: space-evenly;
            padding: 4px;
            box-sizing: border-box;
            background: rgba(0,0,0,0.55);
        }
        #burger-btn span {
            display: block;
            height: 2px;
            background: #fff;
            border-radius: 1px;
        }
        #burger-menu {
            position: fixed;
            left: 0;
            top: max(2vw, 28px);
            background: rgba(0,0,0,0.92);
            border: 1px solid #555;
            z-index: 1000;
            display: none;
            min-width: 110px;
        }
        #burger-menu button {
            display: block;
            width: 100%;
            background: transparent;
            color: #fff;
            border: none;
            border-bottom: 1px solid #333;
            padding: 8px 12px;
            font-size: max(1.2vw, 12px);
            font-family: monospace;
            cursor: pointer;
            text-align: left;
            box-sizing: border-box;
        }
        #burger-menu button:last-child { border-bottom: none; }
        #burger-menu button:hover:not(:disabled) { background: #333; }
        #burger-menu button:disabled { color: #555; cursor: default; }
    </style>
    <script type="text/javascript" src="qbasicplayer.js"></script>
    <script type="text/javascript" src="globals.js"></script>
    <script type="text/javascript" src="lang.js"></script>
    <script type="text/javascript" src="resources_da.js"></script>
    <script type="text/javascript" src="resources_en.js"></script>
    <script type="text/javascript" src="cgafont.js"></script>
    <script type="text/javascript" src="help.js"></script>
    <script type="text/javascript" src="harbor.js"></script>
    <script type="text/javascript" src="city.js"></script>
    <script type="text/javascript" src="board.js"></script>
    <script type="text/javascript" src="shoot.js"></script>
    <script type="text/javascript" src="promote.js"></script>
    <script type="text/javascript" src="enemy.js"></script>
    <script type="text/javascript" src="mist.js"></script>
    <script type="text/javascript" src="attack.js"></script>
    <script type="text/javascript" src="kaper.js"></script>
    <script type="text/javascript" src="player.js"></script>
    <script type="text/javascript" src="map.js"></script>
</head>
<body>
<div id="burger-btn" title="Menu" onclick="if(window.privateerApp){window.privateerApp.toggleBurgerMenu()}">
    <span></span><span></span><span></span>
</div>
<div id="burger-menu">
    <button id="burger-item-new"      onclick="if(window.privateerApp){window.privateerApp.burgerNew()}">New</button>
    <button id="burger-item-save"     onclick="if(window.privateerApp){window.privateerApp.burgerSave()}" disabled>Save</button>
    <button id="burger-item-name"     onclick="if(window.privateerApp){window.privateerApp.burgerName()}">Name</button>
    <button id="burger-item-language" onclick="if(window.privateerApp){window.privateerApp.burgerLanguage()}">Language</button>
    <button id="burger-item-install"  onclick="if(window.privateerInstallApp){window.privateerInstallApp()}" style="display:none;">Install</button>
</div>
<script>
// Close burger menu when clicking outside of it.
document.addEventListener('click', function(e) {
    var btn  = document.getElementById('burger-btn');
    var menu = document.getElementById('burger-menu');
    if (menu && btn && !btn.contains(e.target) && !menu.contains(e.target))
        menu.style.display = 'none';
});
</script>
<!-- Game is launched in the globals.js after all images have been loaded.-->
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
        navigator.serviceWorker.register("service-worker.js").catch(function (error) {
            console.error("Service worker registration failed:", error);
        });
    });
}

// Capture install event and expose a user-gesture-driven install action.
(function () {
    var deferredInstallPrompt = null;
    var installBtn = null;

    function updateInstallButtonVisibility() {
        if (!installBtn) installBtn = document.getElementById("burger-item-install");
        if (!installBtn) return;
        installBtn.style.display = deferredInstallPrompt ? "block" : "none";
    }

    window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        deferredInstallPrompt = e;
        updateInstallButtonVisibility();
    });

    window.addEventListener("appinstalled", function () {
        deferredInstallPrompt = null;
        updateInstallButtonVisibility();
    });

    window.privateerInstallApp = function () {
        if (!deferredInstallPrompt) return;

        deferredInstallPrompt.prompt();
        deferredInstallPrompt.userChoice.finally(function () {
            deferredInstallPrompt = null;
            updateInstallButtonVisibility();
        });
    };

    updateInstallButtonVisibility();
})();

// Prevent left/right edge-swipe browser navigation on mobile.
(function () {
    var edgeSize = 24;
    var edgeSwipeActive = false;
    var startX = 0;
    var startY = 0;

    window.addEventListener("touchstart", function (e) {
        if (!e.touches || e.touches.length !== 1) {
            edgeSwipeActive = false;
            return;
        }

        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        edgeSwipeActive = startX <= edgeSize || startX >= (window.innerWidth - edgeSize);
    }, { passive: true });

    window.addEventListener("touchmove", function (e) {
        if (!edgeSwipeActive || !e.touches || e.touches.length !== 1) {
            return;
        }

        var dx = e.touches[0].clientX - startX;
        var dy = e.touches[0].clientY - startY;

        if (Math.abs(dx) > Math.abs(dy)) {
            e.preventDefault();
        }
    }, { passive: false });

    window.addEventListener("touchend", function () {
        edgeSwipeActive = false;
    }, { passive: true });

    window.addEventListener("touchcancel", function () {
        edgeSwipeActive = false;
    }, { passive: true });
})();
</script>
</body>
</html>
